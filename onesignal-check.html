<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneSignal Check | MA PLAST</title>
  <meta name="robots" content="noindex,nofollow">
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "a4aee757-dd1f-4247-8ac7-ad5eaee17ea5",
        serviceWorkerPath: "service-worker.js",
        serviceWorkerParam: { scope: "/" },
        notifyButton: { enable: false },
        autoResubscribe: true
      });
    });
  </script>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; color:#000; padding:24px; }
    .box { max-width:860px; margin:40px auto; background:#fff; border-radius:22px; border:1px solid #ddd; padding:26px; box-shadow:0 20px 60px rgba(0,0,0,.08); }
    button { background:#000; color:#fff; border:0; border-radius:999px; padding:14px 20px; font-weight:800; cursor:pointer; margin:6px; }
    .muted { color:#555; line-height:1.7; }
    pre { background:#111; color:#fff; padding:18px; border-radius:16px; overflow:auto; direction:ltr; text-align:left; }
    .warn { background:#fff3cd; border:1px solid #ffec99; padding:12px; border-radius:14px; margin:12px 0; }
  </style>
</head>
<body>
  <div class="box">
    <h1>MA PLAST Notification Setup Check</h1>
    <p class="muted">This version uses your existing service-worker.js with OneSignal inside it.</p>
    <div class="warn">After uploading this ZIP, open this page, press Force Subscribe, then Check Status.</div>
    <button onclick="forceSubscribe()">Force Subscribe</button>
    <button onclick="checkStatus()">Check Status</button>
    <button onclick="resetServiceWorker()">Reset Service Worker</button>
    <a href="index.html"><button>Back to App</button></a>
    <pre id="result">Waiting...</pre>
  </div>

<script>
async function forceSubscribe() {
  const out = document.getElementById('result');

  try {
    if (!('Notification' in window)) {
      out.textContent = 'Notifications are not supported in this browser.';
      return;
    }

    if (Notification.permission === 'denied') {
      out.textContent = 'BLOCKED: Notifications are blocked. Click the lock/settings icon beside the URL, set Notifications to Allow, then refresh.';
      return;
    }

    const browserPermission = await Notification.requestPermission();

    if (browserPermission !== 'granted') {
      out.textContent = 'Permission result: ' + browserPermission + '. You must choose Allow.';
      return;
    }

    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      try {
        if (OneSignal.User && OneSignal.User.PushSubscription && OneSignal.User.PushSubscription.optIn) {
          await OneSignal.User.PushSubscription.optIn();
        }
        setTimeout(checkStatus, 1800);
      } catch (e) {
        out.textContent = 'OneSignal optIn error: ' + e.message;
      }
    });
  } catch (e) {
    out.textContent = 'Error: ' + e.message;
  }
}

function checkStatus() {
  const out = document.getElementById('result');
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    const status = {
      currentUrl: location.href,
      browserPermission: Notification.permission,
      oneSignalId: OneSignal.User ? OneSignal.User.onesignalId : null,
      pushSubscriptionId: OneSignal.User && OneSignal.User.PushSubscription ? OneSignal.User.PushSubscription.id : null,
      token: OneSignal.User && OneSignal.User.PushSubscription ? OneSignal.User.PushSubscription.token : null,
      optedIn: OneSignal.User && OneSignal.User.PushSubscription ? OneSignal.User.PushSubscription.optedIn : null,
      serviceWorkerController: navigator.serviceWorker && navigator.serviceWorker.controller ? navigator.serviceWorker.controller.scriptURL : null
    };
    out.textContent = JSON.stringify(status, null, 2);
  });
}

async function resetServiceWorker() {
  const regs = await navigator.serviceWorker.getRegistrations();
  for (const reg of regs) {
    await reg.unregister();
  }
  if ('caches' in window) {
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  }
  document.getElementById('result').textContent = 'Service worker and cache cleared. Refresh the page now.';
}

setTimeout(checkStatus, 2500);
</script>
</body>
</html>
