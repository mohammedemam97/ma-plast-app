<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — MA PLAST GROUP</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


    <!-- OneSignal Web Push SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "a4aee757-dd1f-4247-8ac7-ad5eaee17ea5",
          serviceWorkerPath: "service-worker.js",
          serviceWorkerParam: { scope: "/" },
          notifyButton: { enable: false },
          autoResubscribe: true
        });
      });
    </script>

</head>
<body style="background:#f5f5f5;">
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
    <div class="reveal visible" style="max-width:400px;">
      <div style="width:80px;height:80px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
        <i class="fas fa-wifi" style="font-size:1.8rem;color:#fff;"></i>
      </div>
      <h1 style="font-size:2rem;margin-bottom:0.75rem;color:#000;">You are offline</h1>
      <p style="margin-bottom:1.5rem;color:#666;line-height:1.6;">Please check your internet connection and try again. Your cart and saved items will be here when you return.</p>
      <a class="btn btn-primary" href="index.html" style="width:auto;padding:0.875rem 2rem;">Back to Home</a>
    </div>
  </main>
</body>
</html>
